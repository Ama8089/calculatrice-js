name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Lancer les tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        # ^ Astuce : tester sur 2 versions de Node.js en parallèle !
    
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3
      
      - name: 🟢 Installer Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          # ^ Cache les dépendances pour aller plus vite
      
      - name: 📦 Installer les dépendances
        run: npm ci
        # npm ci est plus strict que npm install (recommandé en CI)
      
      - name: 🧪 Lancer les tests avec couverture
        run: npm run test:coverage
      
      - name: 📊 Afficher le résumé
        run: |
          echo '=== Résultats des tests ==='
          npm test -- --verbose
